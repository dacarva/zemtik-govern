# E2E governance policy — deny-by-default moat in action.
#
# READS are explicitly allowed. WRITES (transfer_funds, close_account) have NO
# rule, so AgentOsPolicy's deny-by-default override blocks them. The audit trail
# therefore captures BOTH an allow path and a deny path in one real agent run.
#
# action == tool name (govern_tool defaults GovernanceContext.action to the
# wrapped tool's .name). See src/zemtik_govern/langchain/tools.py:185.
mode: enforce
audit_sink: sandbox/e2e.audit.jsonl
# enforce/strict modes require an explicit injection rule set (#36): a poisoned
# tool argument is denied by the guard before policy, never run on AGT samples.
injection_rules_path: policies/prompt-injection.yaml
rules:
  - name: allow-get-balance
    condition:
      field: action
      operator: eq
      value: get_balance
    action: allow
  - name: allow-list-accounts
    condition:
      field: action
      operator: eq
      value: list_accounts
    action: allow
  - name: allow-search-transactions
    condition:
      field: action
      operator: eq
      value: search_transactions
    action: allow
  # transfer_funds  -> no rule -> DENIED by default (deny-by-default moat)
  # close_account   -> no rule -> DENIED by default
  # search_transactions IS allowed by policy, but a poisoned `query` argument is
  # still denied by the prompt-injection guard BEFORE policy (#36).
