# zemtik-govern — example configuration
#
# Copy to zemtik.yaml and edit. Loaded by GovernanceConfig.load(path).
# In `strict` mode the wrapper refuses to start without BOTH a policy source
# (inline rules or a non-empty policy_dir) AND an audit sink.

# strict | shadow | enforce  (strict is the secure default)
#   strict / enforce — a deny is enforced: GovernanceDenied is raised, tool blocked.
#   shadow           — a deny is recorded but NOT enforced; the tool still runs.
#                      Use it to surface false-denies on live traffic before
#                      switching to enforce. Shadow still requires an audit sink.
# The kill-switch (operational, not config) reverts a running governor to its
# prior governed fallback path — never to allow-all.
mode: strict

# Where the audit trail goes.
#   "memory"  — the in-memory Merkle-chained log (default).
#   <path>    — a durable, HMAC-signed FileAuditSink at that path. The signing
#               key is read from $ZEMTIK_AUDIT_SECRET (NOT this file); a file sink
#               without it refuses to start. Required in every mode.
audit_sink: memory

# Inline policy rules. AGT fails OPEN on no match; the wrapper imposes
# deny-by-default, so anything not explicitly allowed here is denied.
#
# Rule shape verified against AGT's PolicyDocument / PolicyRule / PolicyCondition
# interface (agent_os.policies.schema):
#   name      — str (required, unique within document)
#   condition — PolicyCondition: {field: str, operator: str, value: Any}
#   action    — PolicyAction: "allow" | "deny"
# Optional rule fields (not shown): priority (int, default 0), message (str),
# override (bool).
rules:
  - name: allow-tool-run
    condition:
      field: action
      operator: eq
      value: tool.run
    action: allow

# Alternatively, load rules from a directory of policy files instead of inline:
# policy_dir: ./policies

# Prompt-injection rule file (#36). OPTIONAL. In strict/enforce the guard is
# always on; with no path it uses AGT's own vetted detection rules (explicit,
# warning-free, tracks the pinned AGT wheel — nothing to maintain). Set a path
# ONLY to pin a version or diverge from AGT; the file must contain a
# `detection_patterns` section or startup fails (GovernanceNotConfigured). The
# screen wraps the SELECTED policy engine — primary AND killswitch fallback — so an
# injection cannot slip through during a killswitch emergency. A hit is a policy
# deny that names the offending FIELD only (never the raw payload). Shadow mode
# may omit the guard entirely. policies/prompt-injection.yaml is a ready-to-edit
# snapshot of AGT's defaults.
# injection_rules_path: policies/prompt-injection.yaml

# Per-guard stance (D10). Scope shadow to ONE guard for an observe-then-enforce
# upgrade: run a new guard in `shadow` for a release to watch would-denies in the
# log, then flip to `enforce`. Independent of the global `mode` above. Both default
# to `enforce`. Flat keys (injection_mode / budget_mode) also work.
# injection:
#   mode: enforce          # enforce | shadow
#   confidence_floor: 0.0  # reserved paranoid dial; off by default (0.0)
# budget:
#   mode: enforce          # enforce | shadow

# Bounded idempotency caches (#35). The decision ledger and the proxy effect-dedup
# slots share ONE bounded LRU+TTL cache, so unique-key traffic cannot grow them
# without bound and a stale decision expires + re-evaluates. Defaults: 10000
# entries, 3600s TTL. Set ttl to null for no expiry (LRU-only).
idempotency_max_entries: 10000
idempotency_ttl_seconds: 3600.0

# Per-call decision budget, in SECONDS, for the identity + policy path. A breach
# fails closed (audited system error; the tool never runs), never an implicit
# allow. Defaults to 5.0; lower it on latency-sensitive (e.g. voice) paths. Set to
# null to opt out — only when an upstream caller enforces its own deadline.
# Unit is in the name to kill the seconds-vs-ms footgun.
decision_budget_seconds: 5.0

# ---------------------------------------------------------------------------
# Output screening (post-invocation rail seam, #39/#40)
#
# The output seam runs ONLY inside proxy(). Direct govern()/govern_sync()
# callers are input-only — no output redaction occurs on those paths.
# ---------------------------------------------------------------------------

# Master switch: set to true to enable the output rail seam in proxy().
# Off by default — opt-in. Without this set, proxy() returns raw tool output
# regardless of the rails configured below.
output_screening: false

# Classify each action as read or write.
#   read  — a PII hit RAISES OutputGovernanceDenied (value withheld).
#   write — a PII hit RETURNS RedactedOutput sentinel (value scrubbed, audit row
#           written at HIGH severity) because the side effect already executed.
# An action absent from this map defaults to write (fail-closed). When the output
# seam is active, a WARNING is logged once per unmapped action so a forgotten
# read tool is caught in dev/staging before it ships as a silently-redacted write.
tool_io_map:
  tool.run: read     # change to write for tools that mutate external state
  # tool.search: read
  # payment.send: write

# Per-rail thresholds and modes. Each named rail corresponds to one output
# classifier; C0 ships "pii" (RegexPIIClassifier). The mode is independent of
# the global `mode` above — the classic observe-then-enforce onboarding path:
#
#   Step 1 — OBSERVE (ship in shadow, watch audit rows for output_would_deny):
#     rails:
#       pii:
#         threshold: 0.0
#         mode: shadow
#
#   Step 2 — ENFORCE (after a release with no false-denies, flip to enforce):
#     rails:
#       pii:
#         threshold: 0.0
#         mode: enforce   # read tools raise; write tools return RedactedOutput
#
# threshold: 0.0–1.0. The regex PII rail is binary (confidence 1.0) so any
# threshold <= 1.0 lets it fire. Scoring providers (e.g. Presidio, C1 roadmap)
# surface real confidences you can tune here.
rails:
  pii:
    threshold: 0.0
    mode: shadow    # start in shadow; flip to enforce once you've reviewed
