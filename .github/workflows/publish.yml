name: publish

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PIP_AUDIT: pip-audit@2.10.1
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv
        run: uv venv

      - name: Install pinned dependencies (runtime + dev + extras)
        run: uv pip install --require-hashes -r requirements-all.lock

      - name: Install the package (no deps — already pinned above)
        run: uv pip install --no-deps -e ".[dev,langchain,mcp,openai]"

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Test (unit + AGT conformance + e2e)
        run: .venv/bin/pytest -q

      - name: Audit runtime dependencies (pip-audit)
        run: uvx "$PIP_AUDIT" --require-hashes --requirement requirements.lock --strict

      - name: Audit full dependency set incl. extras (pip-audit)
        run: uvx "$PIP_AUDIT" --require-hashes --requirement requirements-all.lock --strict

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
