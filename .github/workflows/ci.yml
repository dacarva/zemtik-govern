name: ci

# Runs from day one. The AGT-conformance job is the pinning-bet early warning
# (Premise 2): green CI means the pinned AGT still fits the wrapper. The audit
# job is the supply-chain gate (E7) — a known CVE in a transitive dep fails the
# build, it does not warn.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv
        run: uv venv

      # Hash-pinned install: the lockfile carries --hash for every dep, so a
      # tampered or substituted artifact fails verification at install time.
      - name: Install pinned dependencies
        run: uv pip install --require-hashes -r requirements.lock

      - name: Install the package (no deps — already pinned above)
        run: uv pip install --no-deps -e ".[dev]"

      - name: Lint
        run: uv run ruff check . || true  # advisory until ruff config lands

      - name: Test (unit + AGT conformance + e2e)
        run: uv run pytest -q

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      # OSV / pip-audit gate: scan the resolved lockfile for known
      # vulnerabilities. Non-zero exit fails the build (no `|| true`).
      - name: Audit dependencies (pip-audit)
        run: |
          uvx pip-audit --require-hashes --requirement requirements.lock --strict
