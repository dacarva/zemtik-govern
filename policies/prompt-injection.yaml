# zemtik-govern — pinned prompt-injection detection rules (#36)
#
# Loaded through AGTBoundary.prompt_injection_detector() into AGT's
# PromptInjectionDetector(injection_config=...). Shipping an EXPLICIT rule set is
# mandatory: the bare detector falls back to AGT's sample rules and emits a
# UserWarning (see spike/injection-detector-findings.md). A non-shadow governor
# refuses to start without this file (GovernanceNotConfigured) rather than ship
# sample coverage — mirroring the AGT-pins / audit-secret boot-time contract.
#
# Format consumed by agent_os.prompt_injection.load_prompt_injection_config:
# a top-level `detection_patterns` section (required) of regex lists per category.
# Tune for your own threat model; these are a conservative, pinned starting set.
detection_patterns:
  direct_override:
    - "(?i)ignore\\s+(all\\s+)?(previous|prior|above|earlier)\\s+(instructions|prompts|rules|context)"
    - "(?i)disregard\\s+(all\\s+)?(previous|prior|your|the)\\s+(instructions|rules|prompt)"
    - "(?i)forget\\s+(everything|all|your\\s+instructions|previous)"
    - "(?i)override\\s+(your|the|all)\\s+(instructions|rules|system\\s+prompt)"
    - "(?i)new\\s+instructions?\\s*:?\\s*(ignore|disregard|forget)"
  delimiter:
    - "(?i)<\\|im_start\\|>"
    - "(?i)<\\|im_end\\|>"
    - "(?i)\\[INST\\]"
    - "(?i)\\[/INST\\]"
    - "(?i)###\\s*(system|instruction)"
  role_play:
    - "(?i)you\\s+are\\s+now\\s+(a|an|in)\\s+.*(mode|persona|character|assistant)"
    - "(?i)pretend\\s+(to\\s+be|you\\s+are|that)"
    - "(?i)act\\s+as\\s+(if|a|an|though)"
    - "(?i)\\bDAN\\b|do\\s+anything\\s+now"
    - "(?i)developer\\s+mode\\s+(enabled|on)"
  context_manipulation:
    - "(?i)(reveal|show|print|repeat)\\s+(your|the)\\s+(system\\s+prompt|instructions|rules)"
    - "(?i)what\\s+(are|were)\\s+your\\s+(original\\s+)?instructions"
    - "(?i)end\\s+of\\s+(prompt|context|instructions)"
  multi_turn:
    - "(?i)as\\s+we\\s+(agreed|discussed)\\s+earlier.*(ignore|bypass|override)"
  encoding:
    - "(?i)decode\\s+(this|the\\s+following)\\s+(base64|hex|rot13)"
    - "(?i)execute\\s+(the\\s+)?(decoded|following)\\s+"
suspicious_decoded_keywords:
  - "ignore"
  - "system prompt"
  - "exfiltrate"
  - "credentials"
  - "api key"
disclaimer: "zemtik-govern pinned rules; deny on match (D6: never echo payload)."
